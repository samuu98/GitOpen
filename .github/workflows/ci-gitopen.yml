name: CI GitOpen

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      # First-party (`actions/*`) actions stay on a major-version tag — GitHub
      # owns them, so the supply-chain risk is the same as trusting GitHub.
      - name: Checkout
        uses: actions/checkout@v6

      # Third-party actions are SHA-pinned (supply-chain best practice). Bump the
      # SHA together with the version comment when the action releases.
      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true

      - name: Linux desktop deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgtk-3-dev \
            liblzma-dev \
            libstdc++-12-dev

      - name: Pub get
        run: flutter pub get

      - name: Codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
